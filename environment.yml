# Para criar o ambiente a partir deste arquivo, execute no terminal:
# conda env create -f environment.yml

name: cookiecutter-kaggle
channels:
  - pytorch
  - anaconda
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - cookiecutter
  - numpy
  - pandas
  - scikit-learn
  - statsmodels
  - matplotlib
  - seaborn
  - plotly
  - missingno
  - pandas-profiling
  - optuna
  - joblib
  - tqdm
  - python-dotenv
  - invoke
  - path.py
  - jupyter
  - jupyterlab
  - nbdime
  - ipykernel
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1 # Versao estavel e recomendada para a GPU GTX 1650 (compativel com driver 12.8)
  # - cpuonly # Use esta linha se for rodar apenas em CPU (removendo pytorch-cuda)
  - pip
  - pip:
      - black
      - pylint
      - lightgbm
      - xgboost
      - catboost
      - h2o
      - pyspark
      - kaggle
      - mlflow
      # Descomente abaixo se for utilizar LLMs e desenvolvimento de Agentes:
      # - langchain
      # - langchain-openai
      # - langgraph
      # - openai
